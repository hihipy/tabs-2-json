name: Link Check

on:
  # Run on pushes to main that touch markdown
  push:
    branches: [main]
    paths:
      - "**.md"
      - ".github/workflows/links.yml"
      - ".lycheeignore"

  # Run on pull requests that touch markdown
  pull_request:
    paths:
      - "**.md"
      - ".github/workflows/links.yml"
      - ".lycheeignore"

  # Run once a week on Mondays at 11:00 UTC so rotting links get caught
  # even when nothing has changed
  schedule:
    - cron: "0 11 * * 1"

  # Allow manual runs from the Actions tab
  workflow_dispatch:

jobs:
  link-check:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@v5

      - name: Restore lychee cache
        uses: actions/cache@v4
        with:
          path: .lycheecache
          key: cache-lychee-${{ github.sha }}
          restore-keys: cache-lychee-

      - name: Run lychee
        id: lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: --cache --max-cache-age 1d --no-progress --verbose --accept 100..=103,200..=299,403,429 **/*.md
          fail: false

      - name: Create issue if links are broken
        if: steps.lychee.outputs.exit_code != 0
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: Link Checker Report
          content-filepath: ./lychee/out.md
          labels: documentation, automated
