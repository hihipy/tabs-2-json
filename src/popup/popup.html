<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Tabs2JSON</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
<header class="app-header">
    <div class="header-main">
        <h1>Tabs2JSON</h1>
        <p class="subtitle">Select tabs, then export their text and metadata.</p>
    </div>
    <div class="theme-control">
        <label for="theme">Theme</label>
        <select id="theme">
            <option value="auto">Auto</option>
            <option value="light">Light</option>
            <option value="dark">Dark</option>
        </select>
    </div>
</header>

<div class="toolbar">
    <label class="select-all">
        <input type="checkbox" id="select-all">
        <span>Select All</span>
    </label>
    <div class="toolbar-right">
        <span class="count" id="count" aria-live="polite">0 of 0 selected</span>
        <button type="button" id="refresh" class="icon-btn" aria-label="Refresh Tabs" title="Refresh Tabs">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M21 12a9 9 0 1 1-2.64-6.36"></path>
                <polyline points="21 3 21 9 15 9"></polyline>
            </svg>
        </button>
        <button type="button" id="open-settings" class="icon-btn" aria-label="Open Settings" title="Open Settings">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <circle cx="12" cy="12" r="3"></circle>
                <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
            </svg>
        </button>
    </div>
</div>

<ul class="tab-list" id="tab-list" aria-label="Open tabs"></ul>

<div class="actions">
    <button type="button" id="download" class="btn btn-primary">Download JSON</button>
    <button type="button" id="copy" class="btn btn-secondary">Copy to Clipboard</button>
</div>

<p class="status" id="status" role="status" aria-live="polite"></p>

<script type="module" src="popup.js"></script>
</body>
</html>
